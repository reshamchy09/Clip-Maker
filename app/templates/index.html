<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Video Clip Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 420px;
            background: #111827;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        .drop-area {
            border: 2px dashed #38bdf8;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .drop-area:hover {
            background: rgba(56,189,248,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        input[type="file"] {
            background: #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0ea5e9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .note {
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: #9ca3af;
        }

        /* Progress wrapper */
        .progress-wrap {
            display: none;
            margin-top: 14px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-status {
            font-size: 13px;
            color: #9ca3af;
        }

        .progress-pct {
            font-size: 13px;
            font-weight: 700;
            color: #38bdf8;
            transition: color 0.3s;
        }

        .progress-track {
            height: 7px;
            background: #1f2937;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #38bdf8;
            border-radius: 99px;
            transition: width 0.4s ease, background 0.3s;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AI Video Clipper</h2>

    <form method="post" enctype="multipart/form-data" id="uploadForm">
        {% csrf_token %}

        <div class="drop-area">
            <p>📁 Drag & Drop Video or Click</p>
            {{ form.video }}
        </div>

        <label>Number of Clips</label>
        {{ form.clips_count }}

        <label>Clip Duration (seconds)</label>
        {{ form.clip_duration }}

        <label>Aspect Ratio</label>
        <select name="aspect_ratio">
            <option value="9:16">9:16 (Shorts/Reels)</option>
            <option value="1:1">1:1 (Square)</option>
            <option value="16:9">16:9 (Landscape)</option>
        </select>

        <button type="submit" id="submitBtn">🚀 Generate Clips</button>

        <!-- Progress UI -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-header">
                <span class="progress-status" id="statusMsg">Encoding...</span>
                <span class="progress-pct" id="pctLabel">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="bar"></div>
            </div>
        </div>

        <div class="note">
            Instant AI processing • FFmpeg pipeline • No background queue
        </div>
    </form>
</div>

<script>
    const form       = document.getElementById("uploadForm");
    const bar        = document.getElementById("bar");
    const wrap       = document.getElementById("progressWrap");
    const pctLabel   = document.getElementById("pctLabel");
    const statusMsg  = document.getElementById("statusMsg");
    const btn        = document.getElementById("submitBtn");

    function setProgress(value) {
        const v = Math.round(Math.min(100, Math.max(0, value)));
        bar.style.width = v + "%";
        pctLabel.textContent = v + "%";

        if (v < 95) {
            statusMsg.textContent = "Encoding clips...";
            bar.style.background = "#38bdf8";
            pctLabel.style.color = "#38bdf8";
        } else if (v < 100) {
            statusMsg.textContent = "Zipping...";
        } else {
            statusMsg.textContent = "✅ Done!";
            bar.style.background = "#22c55e";
            pctLabel.style.color = "#22c55e";
        }
    }

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        wrap.style.display = "block";
        btn.disabled = true;
        btn.textContent = "⏳ Processing...";
        setProgress(0);

        const formData = new FormData(form);

        const response = await fetch("/", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            statusMsg.textContent = "❌ Error. Try again.";
            btn.disabled = false;
            btn.textContent = "🚀 Generate Clips";
            return;
        }

        const taskId = response.headers.get("X-Task-Id");

        if (taskId) {
            const source = new EventSource(`/progress/?task_id=${taskId}`);
            source.onmessage = function (event) {
                setProgress(parseInt(event.data));
                if (parseInt(event.data) >= 100) source.close();
            };
        }

        // Trigger ZIP download
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "clips.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setProgress(100);
        btn.disabled = false;
        btn.textContent = "🚀 Generate Clips";
    });
</script>

</body>
</html>
